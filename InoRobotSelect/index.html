<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovance Product Selection Tool</title>
    <!-- Use Google Fonts (Inter) for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>
    <header id="topbar">
        <div class="topbar-left">
            <a href="/" class="logo-link" title="메인 페이지로 이동">
                <img src="INOVANCE_Logo.png" alt="Inovance" class="logo">
            </a>
            <h1 class="app-title">Inovance Robot Select</h1>
        </div>
        <div class="topbar-right">
            <span class="version-badge">Ver 26.03.31.02</span>
        </div>
    </header>

    <div class="main-container">
        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-header">
                <div class="filter-title-wrap">
                    <h2>제품 파라미터 필터</h2>
                </div>
                <button id="reset-btn" class="reset-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                    초기화
                </button>
            </div>

            <div class="filter-grid" id="filter-container">
                <!-- Filters will be generated dynamically -->
            </div>


        </section>

        <!-- Product List Section -->
        <section class="products-section">
            <div class="product-grid" id="product-container">
                <!-- Products will be generated dynamically -->
            </div>
        </section>
    </div>

    <!-- Modal for Options -->
    <div id="options-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 1100px; max-width: 95%; max-height: 90vh;">
            <div class="modal-header" data-html2canvas-ignore="true">
                <h3 id="modal-title">제품 상세 및 구성</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-body" style="display:flex; gap: 40px; overflow-y: auto;">
                <!-- Content will be populated here -->
            </div>
            <div class="modal-footer" data-html2canvas-ignore="true" style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="download-cad-btn" class="primary-btn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16,185,129,0.3);">CAD 다운로드</button>
                <button id="download-pdf-btn" class="primary-btn">구성 내역 다운로드</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="data.js?v=1.0.1"></script>
    <script src="script.js?v=1.0.1"></script>
</body>

</html>
