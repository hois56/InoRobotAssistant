<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovance Debugging Support Tool</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .font-outfit {
            font-family: 'Outfit', sans-serif;
        }

        /* Ambient Background Glow */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.05) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(100px);
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        /* Header Style */
        #topbar {
            position: sticky;
            top: 0;
            height: 72px;
            background: rgba(15, 19, 28, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.09);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 200;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(239, 68, 68, 0.1);
        }

        .status-pill {
            padding: 2px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(2rem); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease forwards;
        }
    </style>
</head>
<body class="relative flex flex-col min-h-screen">
    <div class="ambient-glow"></div>

    <!-- Header -->
    <header id="topbar">
        <div class="flex items-center gap-6">
            <a href="/" class="transition-transform hover:scale-105">
                <img src="../InoRobotSelect/INOVANCE_Logo.png" alt="Inovance" class="h-[60px] w-auto">
            </a>
            <div class="h-8 w-px bg-white/10 mx-2 hidden md:block"></div>
            <h1 class="font-outfit text-xl font-bold text-white hidden md:block tracking-tight">Debugging Tool</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs font-mono text-slate-500 bg-slate-800/40 px-3 py-1.5 rounded-lg border border-white/10 italic">Ver 26.03.31.01</span>
        </div>
    </header>

    <main class="w-full max-w-7xl mx-auto px-6 py-12 flex-grow">
        <!-- Hero Section -->
        <section class="text-center mb-16 animate-fade-in-up">
            <h2 class="font-outfit text-4xl md:text-5xl font-extrabold mb-6 tracking-tight text-white">문제를 발견하셨나요?</h2>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto leading-relaxed italic">
                INOVANCE 로봇의 실시간 상태 진단, 에러 코드 분석 및 문제 해결을 위한 최적의 가이드를 제공합니다.
            </p>
        </section>

        <!-- Tool Grid -->
        <div class="flex justify-center">
            
            <!-- 1. Zero Calibration -->
            <a href="ZeroCalibration/index.html" class="glass-card p-8 flex flex-col w-full max-w-md animate-fade-in-up group" style="animation-delay: 0.2s; text-decoration: none;">
                <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center mb-6 border border-blue-500/20 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="target" class="w-6 h-6 text-blue-500"></i>
                </div>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-outfit text-xl font-bold text-white">Zero Calibration</h3>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-500 group-hover:text-blue-500 group-hover:translate-x-1 transition-all"></i>
                </div>
                <p class="text-slate-400 leading-relaxed text-sm">
                    엔코더 배터리 방전 등으로 인한 영점 소실 시, 하드웨어 지그 없이 소프트웨어적으로 영점을 보정하는 툴입니다.
                </p>
                <div class="mt-8 pt-6 border-t border-white/5 flex items-center gap-2 text-blue-400/60 font-semibold text-xs uppercase tracking-widest group-hover:text-blue-400 transition-colors">
                    <i data-lucide="mouse-pointer-2" class="w-3 h-3"></i> Click to start tool
                </div>
            </a>

        </div>


    </main>

    <script>
        // Initialize Icons
        lucide.createIcons();
    </script>
</body>
</html>
