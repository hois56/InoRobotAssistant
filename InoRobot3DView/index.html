<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovance Robot 3D Viewer</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome (v6) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <!-- OCCT 엔진 & Import-JS (WASM) -->
    <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.12/dist/occt-import-js.js"></script>
</head>
<body>

    <!-- ── TOP NAVIGATION ── -->
    <header id="topbar">
        <div class="topbar-left">
            <a href="../" class="logo-link" title="메인 페이지로 이동">
                <img src="../InoRobotSelect/INOVANCE_Logo.png" alt="Inovance" class="logo">
            </a>
            <h1 class="app-title">Inovance Robot 3D Viewer</h1>
        </div>

        <div class="topbar-center">
            <div class="select-wrapper">
                <i class="fa-solid fa-cube select-icon"></i>
                <select id="model-select">
                    <option value="" disabled selected>로딩 중...</option>
                </select>
                <i class="fa-solid fa-chevron-down arrow-icon"></i>
            </div>
        </div>

        <div class="topbar-right">
            <button id="btn-reset-view" class="ui-btn" title="Reset Camera">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
            <button id="btn-toggle-grid" class="ui-btn" title="Toggle Grid">
                <i class="fa-solid fa-border-all"></i>
            </button>
            <input type="file" id="file-input" style="display:none" accept=".step,.stp,.fbx">
        </div>
    </header>

    <!-- ── MAIN VIEWPORT ── -->
    <main id="main-content">
        <div id="canvas-container">
            <!-- 3D Canvas -->
            <div id="empty-state">
                <div class="hero-icon-wrap">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <h2>Model Visualization</h2>
                <p>상단의 드롭다운 메뉴에서 로봇 모델을 선택해주세요.</p>
                <div class="hint">
                    <i class="fa-solid fa-lightbulb"></i> 마우스로 로봇을 회전하고 확대할 수 있습니다.
                </div>
            </div>

            <!-- Loading Overlay -->
            <div id="loading-overlay" class="hidden">
                <div class="loader-content">
                    <div class="spinner"></div>
                    <p id="loading-text">Loading model...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ── STATS BAR ── -->
    <footer id="stats-bar">
        <div class="stat-item">
            <i class="fa-solid fa-circle-nodes"></i>
            <label>Model</label>
            <span id="stat-name">-</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <i id="status-dot" class="fa-solid fa-circle"></i>
            <label>Status</label>
            <span id="stat-status">Initializing...</span>
        </div>
    </footer>

    <!-- Three.js Module -->
    <script type="module" src="main.js"></script>
</body>
</html>
