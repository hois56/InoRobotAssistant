<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovance Robot 3D Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.12/dist/occt-import-js.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.156.1",
        "three/addons/": "https://esm.sh/three@0.156.1/examples/jsm/"
      }
    }
    </script>
<body>

    <header id="topbar">
        <div class="topbar-left">
            <a href="/" class="logo-link" title="메인 페이지로 이동">
                <img src="../InoRobotSelect/INOVANCE_Logo.png" alt="Inovance" class="logo">
            </a>
            <h1 class="app-title">Inovance Robot 3D Viewer</h1>
        </div>
        <div class="topbar-center">
            <div class="select-wrapper">
                <i class="fa-solid fa-cube select-icon"></i>
                <select id="model-select">
                    <option value="" disabled selected>로딩 중...</option>
                </select>
                <i class="fa-solid fa-chevron-down arrow-icon"></i>
            </div>
        </div>
        <div class="topbar-right">
            <button id="btn-download-cad" class="ui-btn" title="Download CAD files">
                <i class="fa-solid fa-download"></i>
            </button>
            <button id="btn-reset-view" class="ui-btn" title="Reset Camera">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
            <button id="btn-toggle-transform" class="ui-btn active" title="Toggle Coordinate System">
                <i class="fa-solid fa-up-down-left-right"></i>
            </button>
            <button id="btn-toggle-grid" class="ui-btn active" title="Toggle Grid">
                <i class="fa-solid fa-border-all"></i>
            </button>
        </div>
    </header>

    <main id="main-content">
        <div id="canvas-container">
            <div id="empty-state">
                <div class="hero-icon-wrap">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <h2>Model Visualization</h2>
                <p>상단의 드롭다운 메뉴에서 로봇 모델을 선택해주세요.</p>
                <div class="hint">
                    <i class="fa-solid fa-lightbulb"></i> 마우스로 로봇을 회전하고 확대할 수 있습니다.
                </div>
            </div>
            <div id="loading-overlay" class="hidden">
                <div class="loader-content">
                    <div class="spinner"></div>
                    <p id="loading-text">Loading model...</p>
                </div>
            </div>
        </div>
    </main>

    <footer id="stats-bar">
        <div class="stat-item">
            <i class="fa-solid fa-circle-nodes"></i>
            <label>Model</label>
            <span id="stat-name">-</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
            <i id="status-dot" class="fa-solid fa-circle"></i>
            <label>Status</label>
            <span id="stat-status">Initializing...</span>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
